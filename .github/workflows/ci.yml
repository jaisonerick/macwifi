name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  macos:
    name: macOS helper (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # Cover the documented support floor (macOS 13) plus the two
        # currently-supported newer majors so regressions on any of the
        # three OS versions block merge.
        os: [macos-13, macos-14, macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.mod

      - name: Check Go formatting
        run: make fmt-check

      - name: Check module files are tidy
        run: make mod-tidy-check

      - name: Run go vet
        run: make vet

      - name: Run unit tests with race detector
        run: make test-race

      - name: Build Go packages
        run: make build

      - name: Typecheck Swift helper
        run: make swift-check

      - name: Run Swift helper unit tests
        run: make swift-test

      - name: Build ad-hoc signed helper
        run: make scanner-ci

  # Aggregator job pinned in branch protection. Its name stays stable
  # ("macOS helper") even as the matrix expands, so adding new OS rows
  # doesn't require editing the required-status-checks contract.
  macos-helper:
    name: macOS helper
    runs-on: ubuntu-latest
    needs: macos
    if: always()
    steps:
      - name: Require macOS matrix to pass
        env:
          MATRIX_RESULT: ${{ needs.macos.result }}
        run: |
          if [ "$MATRIX_RESULT" != "success" ]; then
            echo "macOS matrix concluded with: $MATRIX_RESULT" >&2
            exit 1
          fi
