name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  macos:
    name: macOS helper
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check Go formatting
        run: make fmt-check

      - name: Check module files are tidy
        run: make mod-tidy-check

      - name: Run go vet
        run: make vet

      - name: Run unit tests with race detector
        run: make test-race

      - name: Build Go packages
        run: make build

      - name: Typecheck Swift helper
        run: make swift-check

      - name: Build ad-hoc signed helper
        run: make scanner-ci
