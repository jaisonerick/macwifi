name: Signed macOS Companion

on:
  workflow_dispatch:
    inputs:
      pr:
        description: Pull request number to update with the signed embedded helper.
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: signed-macos-companion-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Signed companion
    runs-on: macos-latest
    environment: macos-signing

    steps:
      - name: Resolve target ref
        id: target
        env:
          GH_TOKEN: ${{ secrets.MACWIFI_AUTOMATION_TOKEN || github.token }}
          PR_NUMBER: ${{ inputs.pr }}
        run: |
          if [ -n "$PR_NUMBER" ]; then
            pr_json="$(gh pr view "$PR_NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --json baseRefName,headRefName,headRepository,headRepositoryOwner,isCrossRepository,state,title)"
            state="$(jq -r '.state' <<<"$pr_json")"
            base="$(jq -r '.baseRefName' <<<"$pr_json")"
            cross_repo="$(jq -r '.isCrossRepository' <<<"$pr_json")"
            owner="$(jq -r '.headRepositoryOwner.login' <<<"$pr_json")"
            repo="$(jq -r '.headRepository.name' <<<"$pr_json")"
            branch="$(jq -r '.headRefName' <<<"$pr_json")"

            if [ "$state" != "OPEN" ]; then
              echo "PR #$PR_NUMBER is $state, expected OPEN." >&2
              exit 1
            fi
            if [ "$base" != "main" ]; then
              echo "PR #$PR_NUMBER targets $base, expected main." >&2
              exit 1
            fi
            if [ "$cross_repo" != "false" ]; then
              echo "PR #$PR_NUMBER is from a fork; refusing to push signing output to an untrusted fork." >&2
              exit 1
            fi

            echo "ref=$branch" >> "$GITHUB_OUTPUT"
            echo "push_branch=$branch" >> "$GITHUB_OUTPUT"
            echo "push_repo=$owner/$repo" >> "$GITHUB_OUTPUT"
            echo "message=chore: update signed WifiScanner.app for PR #$PR_NUMBER [skip companion]" >> "$GITHUB_OUTPUT"
            echo "mode=pr" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
            echo "push_branch=" >> "$GITHUB_OUTPUT"
            echo "push_repo=" >> "$GITHUB_OUTPUT"
            echo "message=chore: update signed WifiScanner.app [skip companion]" >> "$GITHUB_OUTPUT"
            echo "mode=main-check" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.ref }}
          fetch-depth: 0
          token: ${{ secrets.MACWIFI_AUTOMATION_TOKEN || github.token }}

      - name: Verify signing secrets
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          echo "::add-mask::$MACOS_CERTIFICATE_P12_BASE64"
          echo "::add-mask::$MACOS_CERTIFICATE_PASSWORD"
          echo "::add-mask::$APPLE_APP_SPECIFIC_PASSWORD"

          missing=()
          for name in MACOS_CERTIFICATE_P12_BASE64 MACOS_CERTIFICATE_PASSWORD APPLE_ID APPLE_TEAM_ID APPLE_APP_SPECIFIC_PASSWORD; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub Actions secrets:\n'
            printf '  %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
          keychain_password="$(uuidgen)"

          echo "::add-mask::$MACOS_CERTIFICATE_P12_BASE64"
          echo "::add-mask::$MACOS_CERTIFICATE_PASSWORD"
          echo "::add-mask::$keychain_password"

          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security >/dev/null
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -s "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path" >/dev/null

      - name: Build, sign, notarize, and staple
        env:
          NOTARY_APPLE_ID: ${{ secrets.APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          SIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: make release

      - name: Detect embedded helper changes
        id: embedded_changes
        run: |
          if git diff --quiet -- embedded/WifiScanner.app; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit signed embedded helper
        if: steps.embedded_changes.outputs.changed == 'true'
        id: signed_commit
        env:
          GH_TOKEN: ${{ secrets.MACWIFI_AUTOMATION_TOKEN || github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add embedded/WifiScanner.app
          git commit -m "${{ steps.target.outputs.message }}"

          if [ "${{ steps.target.outputs.mode }}" = "pr" ]; then
            git push "https://x-access-token:${GH_TOKEN}@github.com/${{ steps.target.outputs.push_repo }}.git" \
              "HEAD:${{ steps.target.outputs.push_branch }}"
          else
            echo "Signed embedded helper differs from main. Run this workflow with a PR number so the signed helper is committed before merge." >&2
            exit 1
          fi

      - name: Report unchanged embedded helper
        if: steps.embedded_changes.outputs.changed == 'false'
        run: echo "The notarized helper matches embedded/WifiScanner.app; no generated PR needed."

      - name: Package signed app
        run: |
          ditto -c -k --keepParent WifiScanner.app WifiScanner.app.zip
          ditto -c -k --keepParent embedded/WifiScanner.app embedded-WifiScanner.app.zip

      - name: Upload signed app
        uses: actions/upload-artifact@v4
        with:
          name: signed-wifi-scanner-app
          path: |
            WifiScanner.app.zip
            embedded-WifiScanner.app.zip
          retention-days: 30

      - name: Clean up signing keychain
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/developer-id.p12"
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
