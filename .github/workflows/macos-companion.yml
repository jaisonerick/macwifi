name: Signed macOS Companion

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      pr:
        description: Pull request number to update with the signed embedded helper.
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: signed-macos-companion-pr-${{ github.event.pull_request.number || inputs.pr || github.ref }}
  cancel-in-progress: false

env:
  APP_BUNDLE: embedded/WifiScanner.app
  EXPECTED_TEAM_ID: 3WP9U888B7

jobs:
  plan:
    name: Plan signed companion
    runs-on: ubuntu-latest

    outputs:
      action: ${{ steps.plan.outputs.action }}
      fail_reason: ${{ steps.plan.outputs.fail_reason }}
      pr_number: ${{ steps.plan.outputs.pr_number }}
      push_branch: ${{ steps.plan.outputs.push_branch }}
      push_repo: ${{ steps.plan.outputs.push_repo }}

    steps:
      - name: Resolve pull request
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr }}
        run: |
          set -euo pipefail

          set_output() {
            printf '%s=%s\n' "$1" "$2" >> "$GITHUB_OUTPUT"
          }

          if [ -z "$PR_NUMBER" ]; then
            set_output action fail
            set_output fail_reason "This workflow must be run for a pull request."
            exit 0
          fi

          pr_json="$(gh pr view "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --json baseRefName,headRefName,headRepository,headRepositoryOwner,headRefOid,isCrossRepository,state)"

          state="$(jq -r '.state' <<<"$pr_json")"
          base="$(jq -r '.baseRefName' <<<"$pr_json")"
          cross_repo="$(jq -r '.isCrossRepository' <<<"$pr_json")"
          owner="$(jq -r '.headRepositoryOwner.login' <<<"$pr_json")"
          repo="$(jq -r '.headRepository.name' <<<"$pr_json")"
          branch="$(jq -r '.headRefName' <<<"$pr_json")"
          head_sha="$(jq -r '.headRefOid' <<<"$pr_json")"

          set_output pr_number "$PR_NUMBER"
          set_output push_branch "$branch"
          set_output push_repo "$owner/$repo"

          if [ "$state" != "OPEN" ]; then
            set_output action fail
            set_output fail_reason "PR #$PR_NUMBER is $state, expected OPEN."
            exit 0
          fi
          if [ "$base" != "main" ]; then
            set_output action fail
            set_output fail_reason "PR #$PR_NUMBER targets $base, expected main."
            exit 0
          fi

          changed_files="$(gh pr diff "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --name-only)"
          printf '%s\n' "$changed_files"

          scanner_touched=false
          embedded_touched=false
          while IFS= read -r file; do
            case "$file" in
              scanner/Sources/*|scanner/Info.plist|scanner/entitlements.plist)
                scanner_touched=true
                ;;
              embedded/WifiScanner.app/*)
                embedded_touched=true
                ;;
            esac
          done <<< "$changed_files"

          if [ "$scanner_touched" = false ] && [ "$embedded_touched" = false ]; then
            set_output action noop
            set_output fail_reason ""
            exit 0
          fi

          if [ "$cross_repo" != "false" ]; then
            set_output action fail
            set_output fail_reason "PR #$PR_NUMBER changes the companion from a fork. A maintainer must move the branch into this repository before signing can run."
            exit 0
          fi

          commit_json="$(gh api "repos/$owner/$repo/commits/$head_sha")"
          message="$(jq -r '.commit.message' <<<"$commit_json")"
          author_login="$(jq -r '.author.login // ""' <<<"$commit_json")"
          committer_login="$(jq -r '.committer.login // ""' <<<"$commit_json")"
          expected_message="chore: update signed WifiScanner.app for PR #$PR_NUMBER [skip companion]"

          generated_commit=false
          if [[ "$message" == "$expected_message"* ]] && {
            [ "$author_login" = "github-actions[bot]" ] || [ "$committer_login" = "github-actions[bot]" ];
          }; then
            generated_commit=true
          fi

          if [ "$generated_commit" = true ]; then
            set_output action verify
          elif [ "$scanner_touched" = true ]; then
            set_output action sign
          elif [ "$embedded_touched" = true ]; then
            set_output action verify
          else
            set_output action noop
          fi
          set_output fail_reason ""

  sign:
    name: Build, sign, and notarize companion
    runs-on: macos-latest
    needs: plan
    if: needs.plan.outputs.action == 'sign'
    environment: macos-signing
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check out trusted scripts
        uses: actions/checkout@v6
        with:
          ref: main
          path: trusted

      - name: Check out pull request branch
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.plan.outputs.push_repo }}
          ref: ${{ needs.plan.outputs.push_branch }}
          fetch-depth: 0
          token: ${{ secrets.MACWIFI_AUTOMATION_TOKEN }}
          path: worktree

      - name: Verify signing secrets
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          MACWIFI_AUTOMATION_TOKEN: ${{ secrets.MACWIFI_AUTOMATION_TOKEN }}
        run: |
          set -euo pipefail

          echo "::add-mask::$MACOS_CERTIFICATE_P12_BASE64"
          echo "::add-mask::$MACOS_CERTIFICATE_PASSWORD"
          echo "::add-mask::$APPLE_APP_SPECIFIC_PASSWORD"
          echo "::add-mask::$MACWIFI_AUTOMATION_TOKEN"

          missing=()
          for name in MACOS_CERTIFICATE_P12_BASE64 MACOS_CERTIFICATE_PASSWORD APPLE_ID APPLE_TEAM_ID APPLE_APP_SPECIFIC_PASSWORD MACWIFI_AUTOMATION_TOKEN; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required macos-signing environment secrets:\n'
            printf '  %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
          keychain_password="$(uuidgen)"

          echo "::add-mask::$MACOS_CERTIFICATE_P12_BASE64"
          echo "::add-mask::$MACOS_CERTIFICATE_PASSWORD"
          echo "::add-mask::$keychain_password"

          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security >/dev/null
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -s "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path" >/dev/null

      - name: Build, sign, notarize, and stage helper
        env:
          NOTARY_APPLE_ID: ${{ secrets.APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          SIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          set -euo pipefail

          echo "::add-mask::$NOTARY_PASSWORD"
          "$GITHUB_WORKSPACE/trusted/scripts/release-wifi-scanner-app.sh" \
            --repo-root "$GITHUB_WORKSPACE/worktree"

      - name: Detect embedded helper changes
        id: embedded_changes
        working-directory: worktree
        run: |
          set -euo pipefail

          if git diff --quiet -- "$APP_BUNDLE"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit signed embedded helper
        if: steps.embedded_changes.outputs.changed == 'true'
        working-directory: worktree
        env:
          GH_TOKEN: ${{ secrets.MACWIFI_AUTOMATION_TOKEN }}
        run: |
          set -euo pipefail

          echo "::add-mask::$GH_TOKEN"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$APP_BUNDLE"
          git commit -m "chore: update signed WifiScanner.app for PR #${{ needs.plan.outputs.pr_number }} [skip companion]"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${{ needs.plan.outputs.push_repo }}.git" \
            "HEAD:${{ needs.plan.outputs.push_branch }}"

      - name: Report unchanged embedded helper
        if: steps.embedded_changes.outputs.changed == 'false'
        run: echo "The notarized helper already matches $APP_BUNDLE."

      - name: Package signed app
        working-directory: worktree
        run: |
          set -euo pipefail

          ditto -c -k --keepParent WifiScanner.app WifiScanner.app.zip
          ditto -c -k --keepParent "$APP_BUNDLE" embedded-WifiScanner.app.zip

      - name: Upload signed app
        uses: actions/upload-artifact@v7
        with:
          name: signed-wifi-scanner-app
          path: |
            worktree/WifiScanner.app.zip
            worktree/embedded-WifiScanner.app.zip
          retention-days: 30

      - name: Clean up signing keychain
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/developer-id.p12"
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true

  verify:
    name: Verify signed companion
    runs-on: macos-latest
    needs: plan
    if: needs.plan.outputs.action == 'verify'

    steps:
      - name: Check out trusted scripts
        uses: actions/checkout@v6
        with:
          ref: main
          path: trusted

      - name: Check out pull request branch
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.plan.outputs.push_repo }}
          ref: ${{ needs.plan.outputs.push_branch }}
          fetch-depth: 0
          path: worktree

      - name: Verify embedded helper
        run: |
          set -euo pipefail
          "$GITHUB_WORKSPACE/trusted/scripts/verify-wifi-scanner-app.sh" \
            --repo-root "$GITHUB_WORKSPACE/worktree" \
            --bundle "$GITHUB_WORKSPACE/worktree/$APP_BUNDLE"

  signed-companion:
    name: Signed companion
    runs-on: ubuntu-latest
    needs:
      - plan
      - sign
      - verify
    if: always()

    steps:
      - name: Require signed companion state
        env:
          ACTION: ${{ needs.plan.outputs.action }}
          FAIL_REASON: ${{ needs.plan.outputs.fail_reason }}
          PLAN_RESULT: ${{ needs.plan.result }}
          SIGN_RESULT: ${{ needs.sign.result }}
          VERIFY_RESULT: ${{ needs.verify.result }}
        run: |
          set -euo pipefail

          echo "plan=$PLAN_RESULT action=$ACTION sign=$SIGN_RESULT verify=$VERIFY_RESULT"

          if [ "$PLAN_RESULT" != "success" ]; then
            echo "Planning failed." >&2
            exit 1
          fi

          case "$ACTION" in
            noop)
              echo "No signed companion update is required."
              ;;
            sign)
              if [ "$SIGN_RESULT" != "success" ]; then
                echo "Signing failed or did not complete." >&2
                exit 1
              fi
              ;;
            verify)
              if [ "$VERIFY_RESULT" != "success" ]; then
                echo "Signed companion verification failed." >&2
                exit 1
              fi
              ;;
            fail)
              echo "$FAIL_REASON" >&2
              exit 1
              ;;
            *)
              echo "Unknown signed companion action: $ACTION" >&2
              exit 1
              ;;
          esac
